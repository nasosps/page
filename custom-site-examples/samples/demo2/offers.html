<!doctype html>
<html lang="el">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Custom Site Demo - Ανώνυμο Παράδειγμα</title>
    <meta name="description" content="Δείτε τις τρέχουσες προσφορές και τα πακέτα μας στο Όνομα / Επωνυμία σας εδώ.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --brand-primary: #bda085;
            /* Updated light brown */
            --brand-secondary: #f0e6dc;
            --dark: #1a1a1a;
            --white: #ffffff;
            --bg1: #dfd8cf;
            --bg2: #f4efeb;
            --text: #333333;
            --text-muted: #666666;
            --glass: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.4);
            --card-bg: rgba(255, 255, 255, 0.85);
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            --radius: 20px;
            --font-heading: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            font-family: var(--font-body);
            color: var(--text);
            background:
                radial-gradient(800px 500px at 10% 10%, rgba(163, 124, 100, 0.15), transparent 60%),
                radial-gradient(800px 500px at 90% 90%, rgba(232, 220, 203, 0.8), transparent 60%),
                linear-gradient(135deg, var(--bg2), var(--bg1));
            background-attachment: fixed;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 24px 16px;
        }

        /* Container for the page */
        .container {
            width: min(600px, 100%);
            margin: 0 auto;
        }

        /* Header / Nav */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 10px 0;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--brand-primary);
            font-weight: 600;
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 999px;
            box-shadow: 0 4px 12px rgba(163, 124, 100, 0.1);
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: translateX(-4px);
        }

        .back-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: 26px;
            color: var(--dark);
            text-align: right;
        }

        /* The Grid for Offers */
        #offers-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Loading Skeleton */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Offer Card */
        .offer-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }

        .offer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(163, 124, 100, 0.15);
        }

        .offer-img-wrapper {
            width: 100%;
            height: 220px;
            background: #eee;
            position: relative;
        }

        .offer-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .offer-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--brand-primary);
            color: var(--white);
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .offer-content {
            padding: 20px;
        }

        .offer-title {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .offer-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .offer-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--brand-primary);
            color: var(--white);
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            width: 100%;
            gap: 8px;
        }

        .offer-btn svg {
            width: 18px;
            height: 18px;
            fill: var(--white);
        }

        @media (min-width: 600px) {
            .offer-card {
                flex-direction: row;
                height: 200px;
            }

            .offer-img-wrapper {
                width: 40%;
                height: 100%;
            }

            .offer-content {
                width: 60%;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .offer-btn {
                margin-top: auto;
            }
        }
    </style>
<style id="anon-demo-style">
  .anonymized-demo-badge {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 9999;
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid rgba(15,23,42,.15);
    background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(241,245,249,.92));
    color: #0f172a;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .01em;
    box-shadow: 0 12px 30px rgba(15,23,42,.18);
    backdrop-filter: blur(8px);
  }
  @media (max-width: 768px) {
    .anonymized-demo-badge {
      top: 10px;
      right: 10px;
      left: 10px;
      text-align: center;
      font-size: 11px;
      line-height: 1.35;
    }
  }
</style>
<style id="universal-back-style">
  .universal-back-btn {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 10000;
    border: 1px solid rgba(15,23,42,.16);
    background: rgba(255,255,255,.94);
    color: #0f172a;
    padding: 8px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    box-shadow: 0 8px 20px rgba(15,23,42,.18);
    cursor: pointer;
    backdrop-filter: blur(6px);
  }
  .universal-back-btn:hover {
    background: #fff;
  }
  @media (max-width: 640px) {
    .universal-back-btn {
      top: 10px;
      left: 10px;
      padding: 7px 11px;
      font-size: 11px;
    }
  }
</style>
</head>

<body>
    <button id="universal-back-btn" class="universal-back-btn" type="button">← Πίσω</button>
    <div class="anonymized-demo-badge">Ανώνυμο Demo: Το logo σας εδώ • Η αξιολόγηση εδώ • Η διεύθυνσή σας εδώ</div>

    <div class="container">
        <!-- Navigation -->
        <header>
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                </svg>
                Πίσω
            </a>
            <h1>Προσφορές</h1>
        </header>

        <!-- Dynamic Container -->
        <main id="offers-container">
            <div class="loading">Φόρτωση προσφορών...</div>
        </main>
    </div>

    <!-- The Script that reads the JSON -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('offers-container');

            // Fetch the JSON file
            fetch('offers.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Δεν βρέθηκε το αρχείο προσφορών');
                    }
                    return response.json();
                })
                .then(data => {
                    container.innerHTML = ''; // Clear loading text

                    if (data.length === 0) {
                        container.innerHTML = '<div class="loading">Αυτή τη στιγμή δεν υπάρχουν ενεργές προσφορές.</div>';
                        return;
                    }

                    // Loop through each offer and build the HTML card
                    data.forEach(offer => {
                        // Create the anchor wrapper
                        const card = document.createElement('a');
                        card.className = 'offer-card';
                        card.href = offer.url;
                        card.target = "_blank";
                        card.rel = "noopener";

                        // Decide if we should show an image or a safe fallback
                        const imgSrc = offer.image && offer.image !== "" ? offer.image : 'template-logo.svg';

                        // Build the card inner HTML dynamically
                        card.innerHTML = `
                            <div class="offer-img-wrapper">
                                <img src="${imgSrc}" alt="${offer.title}" class="offer-img" onerror="this.src='template-logo.svg'">
                                ${offer.badge ? `<span class="offer-badge">${offer.badge}</span>` : ''}
                            </div>
                            <div class="offer-content">
                                <h2 class="offer-title">${offer.title}</h2>
                                <p class="offer-subtitle">${offer.subtitle}</p>
                                <div class="offer-btn">
                                    Δείτε Περισσότερα
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M5 13h11.17l-4.88 4.88c-.39.39-.39 1.03 0 1.42.39.39 1.02.39 1.41 0l6.59-6.59c.39-.39.39-1.02 0-1.41l-6.58-6.6a.996.996 0 10-1.41 1.41l4.88 4.88H5c-.55 0-1 .45-1 1s.45 1 1 1z"/>
                                    </svg>
                                </div>
                            </div>
                        `;

                        // Add to page
                        container.appendChild(card);
                    });
                })
                .catch(err => {
                    console.error("Error loading offers:", err);
                    container.innerHTML = '<div class="loading">Υπήρξε πρόβλημα στη φόρτωση. Παρακαλώ δοκιμάστε ξανά αργότερα.</div>';
                });
        });
    </script>
<script id="demo-lock-navigation">
  document.addEventListener('click', function (event) {
    const btn = event.target.closest('button');
    if (!btn || btn.id === 'universal-back-btn') return;
    event.preventDefault();
    window.location.href = 'index.html';
  });
</script>
<script id="universal-back-script">
  (function () {
    const btn = document.getElementById('universal-back-btn');
    if (!btn) return;
    const fallbackUrl = '../../index.html';
    btn.addEventListener('click', function () {
      try {
        const ref = document.referrer ? new URL(document.referrer) : null;
        const sameOriginRef = !!ref && ref.origin === window.location.origin;
        if (sameOriginRef && window.history.length > 1) {
          window.history.back();
          return;
        }
      } catch (e) {
      }
      window.location.href = fallbackUrl;
    });
  })();
</script>

</html>
